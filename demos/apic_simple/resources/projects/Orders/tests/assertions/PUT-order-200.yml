  - name: 'Validate required property: Comment'
    key: json()
    action: haveProperty
    value: Comment
  - name: 'Validate required property: Customer'
    key: json()
    action: haveProperty
    value: Customer
  - name: 'Validate required property: Mail_pref'
    key: json()
    action: haveProperty
    value: Mail_pref
  - name: 'Validate required property: Name'
    key: json()
    action: haveProperty
    value: Name
  - name: 'Validate required property: Product'
    key: json()
    action: haveProperty
    value: Product
  - name: 'Validate required property: Product_code'
