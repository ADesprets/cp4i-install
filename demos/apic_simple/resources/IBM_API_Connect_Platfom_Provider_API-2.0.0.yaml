  /user-registries/{org}/{user-registry}/users:
    description: The collection of User operations
    parameters:
      - $ref: '#/components/parameters/org'
      - $ref: '#/components/parameters/user-registry'
    post:
      summary: Creates a user.
      description: |
        Creates a user entry in a user registry. For user registries that are defined as <i>user managed</i>, a user record is also created in the backing (usually remote) user directory.

                  Required fields:
                  - username
                  
                  Fields allowed but ignored:
                  - id
                  - type
                  - api_version
                  - scope
                  - created_at
                  - updated_at
                  - url
                  - org_url
                  - user_registry_url
      operationId: user_create
      security:
        - oauth:
            - org:manage
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
            examples:
              User:
                summary: Example of user create.
                value:
                  summary: An example user create
                  email: acme@example.com
                  first_name: ACME
                  last_name: Lastname
                  name: acme
                  password: acme@123
                  title: ACME User
                  username: acmeuser
          application/yaml:
            schema:
              $ref: '#/components/schemas/User'
            examples:
              User:
                summary: Example of user create.
                value:
                  summary: An example user create
                  email: acme@example.com
                  first_name: ACME
                  last_name: Lastname
                  name: acme
                  password: acme@123
                  title: ACME User
                  username: acmeuser
      responses:
        '201':
          description: Successful create
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
            application/yaml:
              schema:
                $ref: '#/components/schemas/User'
        '302':
          description: Redirect response
          headers:
            Location:
              description: Redirect payload
              schema:
                type: string
        4XX:
          $ref: '#/components/responses/Error'
        5XX:
          $ref: '#/components/responses/Error'
      tags:
        - User Management
        - 'Resource: User'
    get:
