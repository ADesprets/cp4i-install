      summary: Creates a user registry.
      description: |
        Creates a user registry.

                  Required fields:
                  - integration_url
                  
                  Fields not allowed:
                  - owned
                  
                  Fields allowed but ignored:
                  - id
                  - type
                  - api_version
                  - scope
                  - created_at
                  - updated_at
                  - url
