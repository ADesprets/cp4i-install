apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: ${PGADMIN_GW_ROUTE_NAME}
  namespace: ${VAR_NAMESPACE}
spec:
  to:
    kind: Service
    name: ${MY_PG_PGADMIN_SVC_NAME}
    weight: 100
  port:
    targetPort: pgadmin-port
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None